<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='black'/><text x='32' y='50' font-size='44' font-weight='900' text-anchor='middle' fill='white' font-family='Arial'>Ʃ</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='black'/><text x='32' y='50' font-size='44' font-weight='900' text-anchor='middle' fill='white' font-family='Arial'>Ʃ</text></svg>">
<title>Егерь</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #f5f5f5; --surface: #fff; --border: #e0e0e0; --text: #111; --muted: #888; --accent: #111; --radius: 20px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .auth-wrap { width: 100%; max-width: 380px; padding: 24px 20px; }
  .logo { text-align: center; margin-bottom: 36px; }
  .logo-icon { width: 80px; height: 80px; background: #111; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 52px; font-weight: 900; color: #fff; line-height: 1; }
  .logo-name { font-size: 18px; font-weight: 500; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; }
  .auth-card { background: var(--surface); border-radius: var(--radius); padding: 28px 24px; box-shadow: 0 2px 20px rgba(0,0,0,0.07); }
  .auth-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 16px; outline: none; background: var(--bg); transition: border-color .2s; color: var(--text); }
  .field input:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s; margin-top: 6px; }
  .btn:active { opacity: .7; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: var(--muted); font-weight: 500; margin-top: 10px; }
  .err { color: #c00; font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
  .app { display: none; flex-direction: column; width: 100%; max-width: 480px; height: 100vh; background: var(--surface); }
  .app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .app-header-logo { width: 36px; height: 36px; background: #111; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: #fff; }
  .app-user { font-size: 13px; color: var(--muted); font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; }
  .status-dot.online { background: #22c55e; }
  .btn-logout { background: var(--bg); border: none; border-radius: 10px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--muted); font-weight: 600; }
  .notif-bar { background: var(--bg); padding: 8px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .notif-bar span { font-size: 12px; color: var(--muted); flex: 1; }
  .btn-notif { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 220px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .sidebar-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 14px 6px; }
  .user-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-radius: 12px; margin: 2px 6px; transition: background .15s; }
  .user-item:hover { background: var(--bg); }
  .user-item.active { background: #111; color: #fff; }
  .user-item.active .user-name { color: #fff; }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #555; flex-shrink: 0; }
  .user-item.active .user-avatar { background: #333; color: #fff; }
  .user-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-status { width: 8px; height: 8px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
  .user-status.online { background: #22c55e; }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .chat-empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; text-align: center; padding: 20px; }
  .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
  .msg { max-width: 75%; padding: 9px 13px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-break: break-word; }
  .msg-me { align-self: flex-end; background: #111; color: #fff; border-bottom-right-radius: 4px; }
  .msg-other { align-self: flex-start; background: #eee; color: var(--text); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10px; opacity: .5; margin-top: 3px; text-align: right; }
  .chat-input { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .chat-input input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 18px; font-size: 14px; outline: none; background: var(--bg); color: var(--text); }
  .chat-input input:focus { border-color: var(--accent); }
  .btn-send { background: #111; color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  @media (max-width: 500px) {
    .sidebar { width: 70px; }
    .user-name, .sidebar-title { display: none; }
    .user-item { justify-content: center; padding: 10px; }
    .user-avatar { width: 40px; height: 40px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="auth-wrap" id="authWrap">
  <div class="logo">
    <div class="logo-icon">Ʃ</div>
    <div class="logo-name">Егерь</div>
  </div>
  <div class="auth-card" id="loginCard">
    <div class="auth-title">Вход</div>
    <div class="field"><label>Имя</label><input type="text" id="loginName" placeholder="Никнейм"></div>
    <div class="field"><label>Пароль</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="btn btn-primary" onclick="doLogin()">Войти</button>
    <button class="btn btn-ghost" onclick="showReg()">Нет аккаунта? Зарегистрироваться</button>
    <div class="err" id="loginErr"></div>
  </div>
  <div class="auth-card" id="regCard" style="display:none">
    <div class="auth-title">Регистрация</div>
    <div class="field"><label>Имя</label><input type="text" id="regName" placeholder="Придумай никнейм"></div>
    <div class="field"><label>Пароль</label><input type="password" id="regPass" placeholder="Минимум 4 символа"></div>
    <button class="btn btn-primary" onclick="doRegister()">Создать аккаунт</button>
    <button class="btn btn-ghost" onclick="showLogin()">Уже есть аккаунт? Войти</button>
    <div class="err" id="regErr"></div>
  </div>
</div>

<div class="app" id="appWrap">
  <div class="app-header">
    <div class="app-header-logo">Ʃ</div>
    <div class="app-user">
      <span class="status-dot online" id="statusDot"></span>
      <span id="headerUser"></span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Выйти</button>
  </div>
  <div class="notif-bar">
    <span id="notifStatus">🔔 Уведомления выключены</span>
    <button class="btn-notif" id="notifBtn" onclick="requestNotif()">Включить</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-title">Пользователи</div>
    </div>
    <div class="chat-area">
      <div class="chat-empty-state" id="emptyState">← Выбери собеседника</div>
      <div style="display:none;flex-direction:column;flex:1;overflow:hidden" id="chatBox">
        <div class="chat-header" id="chatHeader"></div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="msgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
          <button class="btn-send" onclick="sendMsg()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let ws = null;
let currentUser = '';
let currentChat = null;
let onlineUsers = new Set();
let vapidKey = '';

function showReg() { document.getElementById('loginCard').style.display='none'; document.getElementById('regCard').style.display='block'; }
function showLogin() { document.getElementById('regCard').style.display='none'; document.getElementById('loginCard').style.display='block'; }

function doRegister() {
  const username = document.getElementById('regName').value.trim();
  const password = document.getElementById('regPass').value;
  if (!username || password.length < 4) { document.getElementById('regErr').textContent = 'Заполни поля (пароль ≥ 4 символа)'; return; }
  connect({ type: 'register', username, password }, 'regErr');
}

function doLogin() {
  const username = document.getElementById('loginName').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) { document.getElementById('loginErr').textContent = 'Заполни все поля'; return; }
  connect({ type: 'login', username, password }, 'loginErr');
}

function connect(authMsg, errId) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => ws.send(JSON.stringify(authMsg));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'error') { document.getElementById(errId).textContent = msg.text; ws.close(); ws = null; return; }
    if (msg.type === 'auth_ok') { currentUser = msg.username; openApp(); return; }
    if (msg.type === 'users') { onlineUsers = new Set(msg.online); renderSidebar(msg.all); return; }
    if (msg.type === 'history') { renderHistory(msg.with, msg.messages); return; }
    if (msg.type === 'message') {
      const other = msg.from === currentUser ? msg.with : msg.from;
      if (other === currentChat) { addBubble(msg); }
      else {
        const item = document.querySelector(`.user-item[data-name="${other}"]`);
        if (item) item.style.fontWeight = '900';
      }
    }
  };
  ws.onclose = () => { document.getElementById('statusDot').classList.remove('online'); };
}

function openApp() {
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'flex';
  document.body.style.justifyContent = 'flex-start';
  document.body.style.alignItems = 'flex-start';
  document.getElementById('headerUser').textContent = currentUser;
  loadVapidKey();
}

function doLogout() {
  if (ws) ws.close();
  currentUser = ''; currentChat = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('sidebar').innerHTML = '<div class="sidebar-title">Пользователи</div>';
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('authWrap').style.display = 'block';
  document.body.style.justifyContent = 'center';
  document.body.style.alignItems = 'center';
}

function renderSidebar(allUsers) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="sidebar-title">Пользователи</div>';
  allUsers.filter(u => u !== currentUser).forEach(u => {
    const isOnline = onlineUsers.has(u);
    const div = document.createElement('div');
    div.className = 'user-item' + (u === currentChat ? ' active' : '');
    div.dataset.name = u;
    div.innerHTML = `<div class="user-avatar">${u[0].toUpperCase()}</div><div class="user-name">${u}</div><div class="user-status ${isOnline ? 'online' : ''}"></div>`;
    div.onclick = () => openChat(u);
    sidebar.appendChild(div);
  });
}

function openChat(username) {
  currentChat = username;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('chatBox').style.display = 'flex';
  document.getElementById('chatHeader').textContent = username;
  document.getElementById('messages').innerHTML = '';
  document.querySelectorAll('.user-item').forEach(el => {
    el.style.fontWeight = '';
    el.classList.toggle('active', el.dataset.name === username);
  });
  ws.send(JSON.stringify({ type: 'get_history', with: username }));
}

function renderHistory(withUser, msgs) {
  if (withUser !== currentChat) return;
  document.getElementById('messages').innerHTML = '';
  msgs.forEach(addBubble);
}

function addBubble(m) {
  const box = document.getElementById('messages');
  const isMe = m.from === currentUser;
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'msg-me' : 'msg-other');
  div.innerHTML = `<div>${m.text}</div><div class="msg-time">${m.time}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws || !currentChat) return;
  ws.send(JSON.stringify({ type: 'message', to: currentChat, text }));
  input.value = '';
}

async function loadVapidKey() {
  try { const r = await fetch('/vapid-public-key'); const d = await r.json(); vapidKey = d.key; } catch {}
  checkNotifStatus();
}

function checkNotifStatus() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    document.getElementById('notifStatus').textContent = '🔕 Браузер не поддерживает уведомления';
    document.getElementById('notifBtn').style.display = 'none'; return;
  }
  if (Notification.permission === 'granted') {
    document.getElementById('notifStatus').textContent = '🔔 Уведомления включены';
    document.getElementById('notifBtn').textContent = 'Тест';
    document.getElementById('notifBtn').onclick = testNotif;
  } else if (Notification.permission === 'denied') {
    document.getElementById('notifStatus').textContent = '🔕 Заблокированы в настройках';
    document.getElementById('notifBtn').style.display = 'none';
  }
}

async function requestNotif() {
  if (!('serviceWorker' in navigator)) return alert('Нужен HTTPS');
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { checkNotifStatus(); return; }
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(vapidKey)
    });
    ws.send(JSON.stringify({ type: 'subscribe', subscription: sub }));
    checkNotifStatus();
  } catch (e) {
    alert('Ошибка подписки: ' + e.message);
  }
}

function testNotif() { new Notification('Егерь', { body: 'Уведомления работают! 🎉' }); }

function urlBase64ToUint8Array(base64String) {
  const base64 = base64String.replace(/-/g, '+').replace(/_/g, '/');
  const padding = '='.repeat((4 - base64.length % 4) % 4);
  const rawData = atob(base64 + padding);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}
</script>
</body>
</html>
