<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="icon" type="image/png" href="/icon.png">
<link rel="apple-touch-icon" href="/icon.png">
<title>Егерь</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #111111;
  --accent2: #444444;
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #111111;
  --muted: #888888;
  --bubble-me: var(--accent);
  --bubble-other: #eeeeee;
  --chat-bg: var(--bg);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* Smooth global */
*, *::before, *::after { -webkit-tap-highlight-color: transparent; }
button { transition: opacity .15s var(--ease), background .15s var(--ease), transform .1s var(--ease); }
button:active { transform: scale(0.93); opacity: .8; }
input, textarea { transition: border-color .2s var(--ease), box-shadow .2s var(--ease); }
input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }

/* Animate messages */
@keyframes msgIn { from { opacity:0; transform: translateY(8px) scale(0.97); } to { opacity:1; transform: none; } }
.msg { animation: msgIn .18s var(--ease) both; }

/* Animate modal */
@keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }
.modal { animation: modalIn .2s var(--ease) both; }

/* Smooth sidebar items */
.chat-item { transition: background .15s var(--ease), transform .1s var(--ease); }
.chat-item:active { transform: scale(0.98); }

/* Smooth avatar */
.ci-avatar img, .hdr-avatar img, .pane-avatar img, .modal-avatar img, .profile-view-avatar img { transition: opacity .2s var(--ease); }

/* Smooth scrollbar */
.messages, .sidebar-list, .mob-list-items { scroll-behavior: smooth; }
.messages::-webkit-scrollbar, .sidebar-list::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb, .sidebar-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 3px; }

/* Send button pulse */
@keyframes sendPulse { 0%{transform:scale(1)} 50%{transform:scale(0.88)} 100%{transform:scale(1)} }
.send-btn:active { animation: sendPulse .15s var(--ease); }

/* Smooth video square */
.msg-video-sq { transition: opacity .2s var(--ease); }

/* iOS momentum scroll */
.messages, .sidebar-list, .mob-list-items { -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }

/* Sticker picker */
.sticker-picker { position: absolute; bottom: 60px; left: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.14); display: none; z-index: 50; width: 300px; max-height: 220px; overflow-y: auto; flex-wrap: wrap; gap: 4px; }
.sticker-picker.open { display: flex; animation: modalIn .18s var(--ease) both; }
.sticker-item { font-size: 30px; cursor: pointer; padding: 5px; border-radius: 10px; transition: background .12s, transform .1s; line-height: 1; }
.sticker-item:hover { background: var(--bg); }
.sticker-item:active { transform: scale(0.85); }
.sticker-msg { font-size: 52px; line-height: 1; background: transparent !important; padding: 4px !important; }

/* Profile banner */
.profile-banner-wrap { position: relative; width: 100%; height: 100px; border-radius: 12px; overflow: hidden; margin-bottom: -44px; cursor: pointer; }
.profile-banner-img { width: 100%; height: 100%; object-fit: cover; }
.profile-banner-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; font-size: 22px; }
.profile-banner-wrap:hover .profile-banner-overlay { opacity: 1; }
.view-banner-wrap { position: relative; width: 100%; height: 90px; border-radius: 12px; overflow: hidden; margin-bottom: -44px; }
.view-banner-img { width: 100%; height: 100%; object-fit: cover; }

/* ── AUTH ── */
.auth-wrap { width: 100%; max-width: 380px; padding: 24px 20px; }
.logo { text-align: center; margin-bottom: 28px; }
.logo-icon { width: 76px; height: 76px; border-radius: 18px; overflow: hidden; margin: 0 auto 10px; }
.logo-icon img { width: 100%; height: 100%; }
.logo-name { font-size: 17px; font-weight: 500; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; }
.auth-card { background: var(--surface); border-radius: 20px; padding: 26px 22px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
.auth-title { font-size: 19px; font-weight: 700; margin-bottom: 18px; text-align: center; }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.6px; }
.field input { width: 100%; padding: 12px 15px; border: 1.5px solid var(--border); border-radius: 13px; font-size: 15px; outline: none; background: var(--bg); color: var(--text); transition: border-color .2s; }
.field input:focus { border-color: var(--accent); }
.field-hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
.btn { width: 100%; padding: 13px; border-radius: 13px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 5px; transition: opacity .15s; }
.btn:active { opacity: .75; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-ghost { background: transparent; color: var(--muted); font-weight: 500; margin-top: 8px; }
.err { color: #c00; font-size: 12px; text-align: center; margin-top: 8px; min-height: 16px; }

/* ── APP ── */
.app { display: none; flex-direction: column; width: 100%; max-width: 960px; height: 100vh; background: var(--surface); position: relative; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
.app-header-left { display: flex; align-items: center; gap: 9px; cursor: pointer; }
.hdr-avatar { width: 34px; height: 34px; border-radius: 50%; overflow: hidden; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
.hdr-avatar img { width: 100%; height: 100%; object-fit: cover; }
.hdr-name { font-size: 14px; font-weight: 700; }
.hdr-sub { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; transition: background .3s; }
.conn-dot.on { background: #22c55e; }
.conn-dot.connecting { background: #f59e0b; }
.hdr-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn { background: none; border: none; font-size: 19px; cursor: pointer; padding: 5px; border-radius: 8px; transition: background .15s; }
.icon-btn:hover { background: var(--bg); }

/* ── MAIN ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { width: 285px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; background: #fafafa; }
.sidebar-head { padding: 10px 10px 6px; flex-shrink: 0; }
.search-box { display: flex; align-items: center; gap: 7px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 11px; padding: 7px 11px; }
.search-box input { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: var(--text); }
.sidebar-list { flex: 1; overflow-y: auto; }
.s-section { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; padding: 9px 13px 3px; }

.chat-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; cursor: pointer; transition: background .12s; position: relative; }
.chat-item:hover { background: #efefef; }
.chat-item:hover .pin-btn { opacity: 1; }
.chat-item.active { background: var(--accent); }
.chat-item.active .ci-name, .chat-item.active .ci-sub, .chat-item.active .ci-time { color: #fff; }
.ci-avatar { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; }
.ci-avatar img { width: 100%; height: 100%; object-fit: cover; }
.chat-item.active .ci-avatar { background: rgba(255,255,255,0.2); }
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.ci-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.ci-time { font-size: 10px; color: var(--muted); }
.unread { background: var(--accent); color: #fff; border-radius: 9px; padding: 1px 6px; font-size: 11px; font-weight: 700; }
.chat-item.active .unread { background: #fff; color: var(--accent); }
.online-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
.pin-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); opacity: 0; background: rgba(0,0,0,.06); border: none; border-radius: 7px; padding: 3px 6px; font-size: 11px; cursor: pointer; }
.chat-item.active .pin-btn { color: #fff; background: rgba(255,255,255,.15); opacity: 0; }
.chat-item.active:hover .pin-btn { opacity: 1; }

.s-result { display: flex; align-items: center; gap: 9px; padding: 9px 12px; cursor: pointer; }
.s-result:hover { background: #efefef; }
.s-result-info { flex: 1; }
.s-result-name { font-size: 14px; font-weight: 600; }
.s-result-sub { font-size: 12px; color: var(--muted); }
.write-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* ── MOBILE LIST ── */
.mob-list { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.mob-list-head { padding: 12px 14px 8px; flex-shrink: 0; }
.mob-list-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.mob-search { display: flex; align-items: center; gap: 7px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 9px 13px; }
.mob-search input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; color: var(--text); }
.mob-list-items { flex: 1; overflow-y: auto; }

/* ── CHAT AREA ── */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }
.chat-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.chat-pane-head { display: flex; align-items: center; gap: 9px; padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
.back-btn { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text); line-height: 1; padding: 0 4px 0 0; }
.pane-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; cursor: pointer; }
.pane-avatar img { width: 100%; height: 100%; object-fit: cover; }
.pane-info { flex: 1; cursor: pointer; }
.pane-name { font-size: 15px; font-weight: 700; }
.pane-sub { font-size: 12px; color: var(--muted); }

.messages { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 3px; background: var(--chat-bg); background-size: cover; background-position: center; }
.msg { max-width: 74%; display: flex; flex-direction: column; }
.msg-me { align-self: flex-end; align-items: flex-end; }
.msg-other { align-self: flex-start; align-items: flex-start; }
.msg-bubble { padding: 8px 12px; border-radius: 16px; font-size: 14px; line-height: 1.45; word-break: break-word; }
.msg-me .msg-bubble { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 4px; }
.msg-other .msg-bubble { background: var(--bubble-other); color: var(--text); border-bottom-left-radius: 4px; }
.msg-file { display: flex; align-items: center; gap: 7px; text-decoration: none; color: inherit; }
.msg-fname { font-size: 13px; font-weight: 600; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.msg-meta { display: flex; align-items: center; gap: 3px; margin-top: 2px; padding: 0 1px; }
.msg-time { font-size: 10px; color: var(--muted); }
.msg-status { font-size: 11px; color: var(--muted); }
.msg-status.read { color: #3b82f6; }

/* Media */
.msg-img { max-width: 220px; max-height: 220px; border-radius: 12px; display: block; cursor: pointer; object-fit: cover; }
.msg-video-sq { width: 180px; height: 180px; border-radius: 18px; object-fit: cover; cursor: pointer; display: block; background: #000; }

/* Input */
.chat-input-wrap { display: flex; align-items: flex-end; gap: 7px; padding: 9px 11px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
.chat-input { flex: 1; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 14px; outline: none; background: var(--bg); color: var(--text); resize: none; max-height: 100px; line-height: 1.4; }
.chat-input:focus { border-color: var(--accent); }
.attach-btn { background: none; border: none; font-size: 21px; cursor: pointer; color: var(--muted); padding: 5px; flex-shrink: 0; }
.video-btn { background: none; border: none; font-size: 21px; cursor: pointer; color: var(--muted); padding: 5px; flex-shrink: 0; }
.send-btn { background: var(--accent); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#fileInput, #videoInput { display: none; }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal { background: var(--surface); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); margin-top: -4px; }
.modal-avatar { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; margin: 0 auto 14px; cursor: pointer; position: relative; }
.modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
.modal-avatar-hint { position: absolute; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; font-size: 22px; opacity: 0; transition: opacity .2s; border-radius: 50%; }
.modal-avatar:hover .modal-avatar-hint { opacity: 1; }
.modal-field { margin-bottom: 13px; }
.modal-field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-field input, .modal-field textarea { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; outline: none; background: var(--bg); color: var(--text); font-family: inherit; }
.modal-field textarea { resize: none; height: 70px; }
.modal-field input:focus, .modal-field textarea:focus { border-color: var(--accent); }
.modal-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; margin-top: 4px; }
.modal-btn-sec { background: var(--bg); color: var(--text); margin-top: 8px; }

/* Profile view modal */
.profile-banner { width: 100%; height: 90px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); border-radius: 12px; margin-bottom: -40px; }
.profile-view-avatar { width: 76px; height: 76px; border-radius: 50%; overflow: hidden; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; border: 3px solid var(--surface); margin: 0 auto 8px; position: relative; z-index: 1; }
.profile-view-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-view-name { text-align: center; font-size: 17px; font-weight: 700; }
.profile-view-user { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.profile-view-bio { text-align: center; font-size: 14px; color: var(--text); margin-bottom: 14px; min-height: 18px; }

/* Media viewer */
.media-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: flex; align-items: center; justify-content: center; z-index: 200; }
.media-overlay img, .media-overlay video { max-width: 95vw; max-height: 92vh; border-radius: 10px; object-fit: contain; }
.media-close { position: absolute; top: 14px; right: 18px; background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 26px; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

/* Theme panel */
.theme-panel { display: flex; flex-direction: column; gap: 12px; }
.theme-row { display: flex; align-items: center; justify-content: space-between; }
.theme-row label { font-size: 14px; font-weight: 500; }
.color-pick { display: flex; align-items: center; gap: 8px; }
.color-pick input[type=color] { width: 36px; height: 36px; border: none; border-radius: 8px; cursor: pointer; padding: 2px; background: none; }
.color-pick span { font-size: 12px; color: var(--muted); }
.wallpaper-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-top: 6px; }
.wp-item { width: 100%; aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
.wp-item.active { border-color: var(--accent); }
.wp-upload { background: var(--bg); border: 2px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
#wpFileInput { display: none; }

/* Recording */
.rec-indicator { display: none; align-items: center; gap: 6px; padding: 6px 10px; background: rgba(220,0,0,.08); border-radius: 10px; }
.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: red; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.rec-time { font-size: 13px; font-weight: 600; color: red; }

@media (max-width: 600px) {
  .sidebar { display: none !important; }
  .back-btn { display: block; }
  .chat-empty { display: none; }
}
@media (min-width: 601px) {
  .mob-list { display: none !important; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="authWrap">
  <div class="logo">
    <div class="logo-icon"><img src="/icon.png" alt="Ʃ"></div>
    <div class="logo-name">Егерь</div>
  </div>
  <div class="auth-card" id="loginCard">
    <div class="auth-title">Вход</div>
    <div class="field"><label>Юзернейм</label><input type="text" id="loginName" placeholder="username" autocomplete="username"></div>
    <div class="field"><label>Пароль</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="doLogin()">Войти</button>
    <button class="btn btn-ghost" onclick="showReg()">Нет аккаунта? Зарегистрироваться</button>
    <div class="err" id="loginErr"></div>
  </div>
  <div class="auth-card" id="regCard" style="display:none">
    <div class="auth-title">Регистрация</div>
    <div class="field"><label>Имя</label><input type="text" id="regDisplay" placeholder="Как тебя зовут?" autocomplete="name"></div>
    <div class="field">
      <label>Юзернейм</label>
      <input type="text" id="regName" placeholder="username" autocomplete="username">
      <div class="field-hint">Буквы, цифры и _ (без @)</div>
    </div>
    <div class="field"><label>Пароль</label><input type="password" id="regPass" placeholder="Минимум 4 символа" autocomplete="new-password"></div>
    <button class="btn btn-primary" onclick="doRegister()">Создать аккаунт</button>
    <button class="btn btn-ghost" onclick="showLogin()">Уже есть аккаунт? Войти</button>
    <div class="err" id="regErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
  <div class="app-header">
    <div class="app-header-left" onclick="openMyProfile()">
      <div class="hdr-avatar" id="hdrAvatar"></div>
      <div>
        <div class="hdr-name" id="hdrName"></div>
        <div class="hdr-sub"><span class="conn-dot" id="connDot"></span><span id="hdrUser"></span></div>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" onclick="openFavorites()" title="Избранное">⭐</button>
      <button class="icon-btn" onclick="openTheme()" title="Тема">🎨</button>
      <button class="icon-btn" id="notifBtn" onclick="requestNotif()" title="Уведомления">🔔</button>
      <button class="icon-btn" onclick="doLogout()" title="Выйти">⏻</button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar desktop -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="search-box">
          <span style="color:var(--muted);font-size:13px">🔍</span>
          <input type="text" id="searchInput" placeholder="Поиск..." oninput="onSearch(this.value)">
        </div>
      </div>
      <div class="sidebar-list" id="sidebarList"></div>
    </div>

    <div class="chat-area">
      <!-- Mobile list -->
      <div class="mob-list" id="mobList">
        <div class="mob-list-head">
          <div class="mob-list-title">Сообщения</div>
          <div class="mob-search">
            <span style="color:var(--muted)">🔍</span>
            <input type="text" id="mobSearchInput" placeholder="Поиск..." oninput="onSearch(this.value)">
          </div>
        </div>
        <div class="mob-list-items" id="mobListItems"></div>
      </div>

      <div class="chat-empty" id="chatEmpty">← Найди собеседника через поиск</div>

      <div class="chat-pane" id="chatPane">
        <div class="chat-pane-head">
          <button class="back-btn" onclick="goBack()">‹</button>
          <div class="pane-avatar" id="paneAvatar" onclick="if(currentChat!=='__favorites__')openUserProfile(currentChat)"></div>
          <div class="pane-info" onclick="if(currentChat!=='__favorites__')openUserProfile(currentChat)">
            <div class="pane-name" id="paneName"></div>
            <div class="pane-sub" id="paneSub"></div>
          </div>
                </div>
        <div class="messages" id="messages"></div>
        <div style="position:relative">
          <div class="sticker-picker" id="stickerPicker"></div>
        </div>
        <div class="chat-input-wrap">
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
          <button class="video-btn" onclick="startVideoRec()" id="videoRecBtn" title="Видео-сообщение">⬛</button>
          <button class="attach-btn" onclick="toggleStickerPicker()" title="Стикеры">😊</button>
          <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.zip" onchange="sendFile(this)">
          <input type="file" id="videoInput" accept="video/*" capture="user" onchange="sendVideoFile(this)">
          <div class="rec-indicator" id="recIndicator">
            <div class="rec-dot"></div>
            <span class="rec-time" id="recTime">0:00</span>
            <button onclick="flipCamera()" style="background:none;border:none;cursor:pointer;font-size:18px" title="Перевернуть">🔄</button>
            <button onclick="stopVideoRec()" style="background:none;border:none;cursor:pointer;font-size:18px">✅</button>
            <button onclick="cancelVideoRec()" style="background:none;border:none;cursor:pointer;font-size:18px">❌</button>
          </div>
          <textarea class="chat-input" id="msgInput" placeholder="Сообщение..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
          <button class="send-btn" onclick="sendMsg()">↑</button>
        </div>

  </div>
</div>

<div class="modal-overlay" id="userProfileModal" style="display:none">

          <span id="colorBubbleVal">#111111</span>
        </div>

        <label>Фон чата</label>

          <span id="colorChatBgVal">#f5f5f5</span>

<script>
let ws = null, wsReady = false, reconnTimer = null;
let currentUser = '', currentDisplay = '', currentAvatar = null;
let currentChat = null;
let allUsers = {};
let chats = {};
let vapidKey = '';
let authCreds = null;
let searchTimer = null;
let mediaRecorder = null, recChunks = [], recTimer = null, recSecs = 0;

const isMob = () => window.innerWidth <= 600;

// ── Storage ───────────────────────────────────────────────
const ss = k => localStorage.getItem(k);
const sw = (k,v) => localStorage.setItem(k,v);
const sd = k => localStorage.removeItem(k);

function saveSession(u,p) { sw('eu',u); sw('ep',p); }
function loadSession() { return {username:ss('eu'),password:ss('ep')}; }
function clearSession() { sd('eu'); sd('ep'); }
function saveChats() { try{sw('ec_'+currentUser,JSON.stringify(chats));}catch{} }
function loadChats() { try{return JSON.parse(ss('ec_'+currentUser)||'{}');}catch{return {};} }
function savePins() { sw('ep_'+currentUser,JSON.stringify(Object.keys(chats).filter(u=>chats[u]?.pinned))); }
function loadPins() { try{return JSON.parse(ss('ep_'+currentUser)||'[]');}catch{return[];} }
function saveTheme(t) { sw('eth',JSON.stringify(t)); }
function loadTheme() { try{return JSON.parse(ss('eth')||'null');}catch{return null;} }

// ── Auth ──────────────────────────────────────────────────
function showReg() { document.getElementById('loginCard').style.display='none'; document.getElementById('regCard').style.display='block'; }
function showLogin() { document.getElementById('regCard').style.display='none'; document.getElementById('loginCard').style.display='block'; }

function doRegister() {
  const dn=document.getElementById('regDisplay').value.trim();
  const u=document.getElementById('regName').value.trim().replace('@','');
  const p=document.getElementById('regPass').value;
  if(!u||!dn||p.length<4){document.getElementById('regErr').textContent='Заполни все поля (пароль ≥ 4)';return;}
  authCreds={type:'register',username:u,password:p,displayName:dn};
  connectWS('regErr');
}
function doLogin() {
  const u=document.getElementById('loginName').value.trim().replace('@','');
  const p=document.getElementById('loginPass').value;
  if(!u||!p){document.getElementById('loginErr').textContent='Заполни все поля';return;}
  authCreds={type:'login',username:u,password:p};
  connectWS('loginErr');
}

// ── WebSocket ─────────────────────────────────────────────
function connectWS(errId) {
  if(ws){try{ws.close();}catch{}}
  setDot('connecting');
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  wsReady=false;

  ws.onopen=()=>{wsReady=true;clearTimeout(reconnTimer);setDot('on');ws.send(JSON.stringify(authCreds));};

  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);

    if(msg.type==='error'){
      if(errId)document.getElementById(errId).textContent=msg.text;
      else{clearSession();location.reload();}
      return;
    }
    if(msg.type==='auth_ok'){
      currentUser=msg.username;currentDisplay=msg.displayName;currentAvatar=msg.avatarUrl;
      saveSession(authCreds.username,authCreds.password);
      chats=loadChats();
      loadPins().forEach(u=>{if(chats[u])chats[u].pinned=true;});
      openApp();
      return;
    }
    if(msg.type==='users'){
      allUsers={};
      msg.users.forEach(u=>allUsers[u.username]={displayName:u.displayName,online:u.online,avatarUrl:u.avatarUrl||null});
      renderLists();
      // Update pane if open
      if(currentChat&&allUsers[currentChat]){
        const info=allUsers[currentChat];
        document.getElementById('paneSub').textContent='@'+currentChat+(info.online?' · онлайн':'');
        renderAvatar(document.getElementById('paneAvatar'),info.displayName,info.avatarUrl);
      }
      return;
    }
    if(msg.type==='history'){renderHistory(msg.with,msg.messages);return;}
    if(msg.type==='message'){
      const other=msg.from===currentUser?msg.with:msg.from;
      if(!chats[other])chats[other]={unread:0,pinned:false};
      chats[other].lastMsg=msg.text||(msg.isVideo?'🎥 Видео':msg.fileName?'📎 '+msg.fileName:'');
      chats[other].lastTime=msg.time;
      const open=other===currentChat&&document.getElementById('chatPane').style.display!=='none';
      if(!open)chats[other].unread=(chats[other].unread||0)+1;
      if(other===currentChat){addBubble(msg);wsSend({type:'read',with:other});}
      saveChats();renderLists();return;
    }
    if(msg.type==='status'){
      const el=document.querySelector(`.msg-status[data-id="${msg.id}"]`);
      if(el){el.textContent=sIcon(msg.status);el.className='msg-status'+(msg.status==='read'?' read':'');}
      return;
    }
    if(msg.type==='read'){
      msg.ids.forEach(id=>{
        const el=document.querySelector(`.msg-status[data-id="${id}"]`);
        if(el){el.textContent='✓✓';el.className='msg-status read';}
      });return;
    }
  };

  ws.onclose=()=>{
    wsReady=false;setDot('');
    if(currentUser){reconnTimer=setTimeout(()=>connectWS(null),3000);}
  };
}

function wsSend(obj){
  if(ws&&wsReady&&ws.readyState===1){ws.send(JSON.stringify(obj));return true;}
  return false;
}
function setDot(s){const d=document.getElementById('connDot');if(d)d.className='conn-dot'+(s==='on'?' on':s==='connecting'?' connecting':'');}

// ── Open App ──────────────────────────────────────────────
function openApp(){
  document.getElementById('authWrap').style.display='none';
  document.getElementById('appWrap').style.display='flex';
  document.body.style.justifyContent='flex-start';
  document.body.style.alignItems='flex-start';
  document.getElementById('hdrName').textContent=currentDisplay;
  document.getElementById('hdrUser').textContent='@'+currentUser;
  renderAvatar(document.getElementById('hdrAvatar'),currentDisplay,currentAvatar);
  if(isMob()){document.getElementById('mobList').style.display='flex';document.getElementById('chatEmpty').style.display='none';}
  loadVapidKey();
  renderLists();
  applyStoredTheme();
}

function doLogout(){clearSession();clearTimeout(reconnTimer);if(ws)ws.close();location.reload();}
function goBack(){
  currentChat=null;
  document.getElementById('chatPane').style.display='none';
  document.getElementById('mobList').style.display='flex';
  renderLists();
}

// ── Avatar helper ─────────────────────────────────────────
function renderAvatar(el,name,avatarUrl){
  if(name==='⭐ Избранное'){el.innerHTML='<span>⭐</span>';el.style.background='#f59e0b';return;}
  if(!el)return;
  if(avatarUrl){
    el.innerHTML=`<img src="${avatarUrl}" alt="">`;
  } else {
    el.innerHTML=`<span>${(name||'?')[0].toUpperCase()}</span>`;
    el.style.background='var(--accent2)';
  }
}

// ── Profile ───────────────────────────────────────────────
function openMyProfile(){
  document.getElementById('profileName').value=currentDisplay;
  const bioEl=document.getElementById('profileBio');
  bioEl.value='';
  fetch('/profile/'+currentUser).then(r=>r.json()).then(d=>{
    bioEl.value=d.bio||'';
    if(d.bannerUrl){
      const wrap=document.getElementById('myBannerWrap');
      wrap.innerHTML=`<img class="profile-banner-img" src="${d.bannerUrl}"><div class="profile-banner-overlay">🖼 Сменить фон</div>`;
      wrap.onclick=()=>document.getElementById('bannerInput').click();
    }
  });
  const av=document.getElementById('myProfileAvatar');
  if(currentAvatar){av.innerHTML=`<img src="${currentAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;av.style.background='none';}
  else{av.textContent=currentDisplay[0].toUpperCase();av.style.background='var(--accent2)';}
  document.getElementById('myProfileModal').style.display='flex';
}

async function uploadAvatar(input){
  const file=input.files[0];if(!file)return;
  const fd=new FormData();fd.append('file',file);fd.append('type','avatar');fd.append('username',currentUser);
  const r=await fetch('/upload',{method:'POST',body:fd});
  const d=await r.json();
  currentAvatar=d.url;
  renderAvatar(document.getElementById('hdrAvatar'),currentDisplay,currentAvatar);
  const av=document.getElementById('myProfileAvatar');
  av.innerHTML=`<img src="${currentAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  input.value='';
}

async function saveProfile(){
  const displayName=document.getElementById('profileName').value.trim();
  const bio=document.getElementById('profileBio').value.trim();
  if(!displayName)return;
  const body={username:currentUser,password:authCreds.password,displayName,bio};
  if(currentBannerUrl)body.bannerUrl=currentBannerUrl;
  await fetch('/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  currentDisplay=displayName;
  document.getElementById('hdrName').textContent=displayName;
  closeModal('myProfileModal');
}

async function openUserProfile(username){
  if(!username)return;
  const r=await fetch('/profile/'+username);
  const d=await r.json();
  const av=document.getElementById('viewAvatar');
  renderAvatar(av,d.displayName,d.avatarUrl||null);
  document.getElementById('viewName').textContent=d.displayName;
  document.getElementById('viewUser').textContent='@'+username;
  document.getElementById('viewBio').textContent=d.bio||'';
  // Banner
  const bannerWrap=document.getElementById('viewBannerWrap');
  if(d.bannerUrl){
    bannerWrap.innerHTML=`<img class="view-banner-img" src="${d.bannerUrl}">`;
  } else {
    bannerWrap.innerHTML='<div id="viewBannerBg" style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2))"></div>';
  }
  document.getElementById('viewWriteBtn').onclick=()=>{closeModal('userProfileModal');openChat(username);};
  document.getElementById('userProfileModal').style.display='flex';
}

// ── Search ────────────────────────────────────────────────
async function onSearch(q){
  clearTimeout(searchTimer);
  if(!q.trim()){renderLists();return;}
  searchTimer=setTimeout(async()=>{
    try{
      const r=await fetch('/search?q='+encodeURIComponent(q.replace('@','')));
      const res=await r.json();
      renderSearchResults(res.filter(u=>u.username!==currentUser));
    }catch{}
  },300);
}

function renderSearchResults(results){
  ['sidebarList','mobListItems'].forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML='';
    if(!results.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">Никого не найдено</div>';return;}
    el.innerHTML='<div class="s-section">Результаты</div>';
    results.forEach(u=>{
      const div=document.createElement('div');
      div.className='s-result';
      const avHTML=u.avatarUrl?`<img src="${u.avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span>${u.displayName[0].toUpperCase()}</span>`;
      div.innerHTML=`<div class="ci-avatar">${avHTML}</div><div class="s-result-info"><div class="s-result-name">${u.displayName}</div><div class="s-result-sub">@${u.username}</div></div><button class="write-btn" onclick="openChat('${u.username}')">Написать</button>`;
      el.appendChild(div);
    });
  });
}

// ── Chat list ─────────────────────────────────────────────
function renderLists(){
  const sq=(document.getElementById('searchInput')||{}).value||'';
  const mq=(document.getElementById('mobSearchInput')||{}).value||'';
  if(sq||mq)return;

  const users2=Object.keys(chats).filter(u=>u!==currentUser&&chats[u]?.lastMsg!==undefined);
  users2.sort((a,b)=>{
    const pa=chats[a].pinned?1:0,pb=chats[b].pinned?1:0;
    if(pa!==pb)return pb-pa;
    return (chats[b].lastTime||'')>(chats[a].lastTime||'')?1:-1;
  });

  ['sidebarList','mobListItems'].forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML='';
    if(!users2.length){el.innerHTML='<div style="padding:24px;text-align:center;color:#aaa;font-size:13px">Используй поиск 🔍 чтобы найти собеседника</div>';return;}
    users2.forEach(u=>{
      const info=allUsers[u]||{displayName:u,online:false,avatarUrl:null};
      el.appendChild(makeChatItem(u,info,chats[u]));
    });
    el.querySelectorAll('.chat-item').forEach(el2=>el2.addEventListener('click',()=>openChat(el2.dataset.user)));
  });
}

function makeChatItem(username,info,chat){
  const div=document.createElement('div');
  div.className='chat-item'+(username===currentChat?' active':'')+(chat.pinned?' pinned':'');
  div.dataset.user=username;
  const avHTML=info.avatarUrl?`<img src="${info.avatarUrl}">`:`<span>${info.displayName[0].toUpperCase()}</span>`;
  const pinLabel=chat.pinned?'Открепить':'Закрепить';
  div.innerHTML=`
    <div class="ci-avatar">${avHTML}</div>
    <div class="ci-info">
      <div class="ci-name">${info.displayName}${chat.pinned?' 📌':''}</div>
      <div class="ci-sub">${esc(chat.lastMsg||'')}</div>
    </div>
    <div class="ci-meta">
      <div class="ci-time">${chat.lastTime||''}</div>
      ${chat.unread?`<div class="unread">${chat.unread}</div>`:(info.online?'<div class="online-dot"></div>':'')}
    </div>
    <button class="pin-btn" onclick="togglePin('${username}',event)">${pinLabel}</button>
  `;
  return div;
}

function togglePin(u,e){e.stopPropagation();if(!chats[u])chats[u]={};chats[u].pinned=!chats[u].pinned;savePins();saveChats();renderLists();}

// ── Open chat ─────────────────────────────────────────────
function openChat(username){
  currentChat=username;
  if(!chats[username])chats[username]={unread:0,pinned:false};
  chats[username].unread=0;saveChats();
  const info=allUsers[username]||{displayName:username,online:false,avatarUrl:null};
  renderAvatar(document.getElementById('paneAvatar'),info.displayName,info.avatarUrl);
  document.getElementById('paneName').textContent=info.displayName;
  document.getElementById('paneSub').textContent='@'+username+(info.online?' · онлайн':'');
  document.getElementById('messages').innerHTML='';
  if(isMob())document.getElementById('mobList').style.display='none';
  document.getElementById('chatEmpty').style.display='none';
  document.getElementById('chatPane').style.display='flex';
  ['searchInput','mobSearchInput'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderLists();
  wsSend({type:'get_history',with:username});
  wsSend({type:'read',with:username});
  document.getElementById('msgInput').focus();
}

function renderHistory(withUser,msgs){
  if(withUser!==currentChat)return;
  document.getElementById('messages').innerHTML='';
  if(msgs.length){
    if(!chats[withUser])chats[withUser]={};
    const last=msgs[msgs.length-1];
    chats[withUser].lastMsg=last.text||(last.isVideo?'🎥 Видео':last.fileName?'📎 '+last.fileName:'');
    chats[withUser].lastTime=last.time;saveChats();
  }
  msgs.forEach(addBubble);
}

function addBubble(m){
  const box=document.getElementById('messages');
  const isMe=m.from===currentUser;
  const div=document.createElement('div');
  div.className='msg '+(isMe?'msg-me':'msg-other');
  let content='';
  if(m.isVideo&&m.fileUrl){
    const vid_id='vid_'+m.id;
    content=`<div style="position:relative;width:180px;height:180px;border-radius:18px;overflow:hidden;cursor:pointer" onclick="toggleVideoSq('${vid_id}')">
      <video id="${vid_id}" class="msg-video-sq" src="${m.fileUrl}" playsinline loop style="pointer-events:none"></video>
      <div id="${vid_id}_play" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);border-radius:18px;transition:opacity .2s">
        <div style="width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:20px">▶</div>
      </div>
    </div>`;
  } else if(m.fileUrl){
    const isImg=m.fileType&&m.fileType.startsWith('image/');
    const isVid=m.fileType&&m.fileType.startsWith('video/');
    if(isImg)content=`<img class="msg-img" src="${m.fileUrl}" onclick="openMedia('img','${m.fileUrl}')">`;
    else if(isVid)content=`<video class="msg-video-sq" src="${m.fileUrl}" onclick="openMedia('video','${m.fileUrl}')" playsinline muted loop></video>`;
    else content=`<a class="msg-file" href="${m.fileUrl}" download="${m.fileName}" target="_blank"><span>📎</span><span class="msg-fname">${m.fileName||'Файл'}</span></a>`;
    if(m.text)content+=`<div style="margin-top:4px">${esc(m.text)}</div>`;
  } else if(m.isSticker){
    content=`<div class="sticker-msg">${m.text}</div>`;
  } else {
    content=`<div>${esc(m.text)}</div>`;
  }

// ── Video messages ────────────────────────────────────────
let recFacing='user';

async function startVideoRec(){
  if(mediaRecorder){stopVideoRec();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:recFacing},audio:true});
    mediaRecorder=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':'video/webm'});
    recChunks=[];recSecs=0;
    // Show live preview
    let preview=document.getElementById('videoPreview');
    if(!preview){
      preview=document.createElement('video');
      preview.id='videoPreview';
      preview.autoplay=true;preview.muted=true;preview.playsInline=true;
      preview.style.cssText='width:160px;height:160px;border-radius:18px;object-fit:cover;display:block;margin:6px 0;background:#000;transform:scaleX(-1)';
      document.getElementById('recIndicator').parentNode.insertBefore(preview,document.getElementById('recIndicator'));
    }
    preview.srcObject=stream;preview.style.display='block';
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const preview2=document.getElementById('videoPreview');
      if(preview2){preview2.style.display='none';preview2.srcObject=null;}
      const mime=mediaRecorder.mimeType||'video/webm';
      const ext=mime.includes('mp4')?'mp4':'webm';
      const blob=new Blob(recChunks,{type:mime});
      const fd=new FormData();fd.append('file',new File([blob],`video.${ext}`,{type:mime}));
      try{const r=await fetch('/upload',{method:'POST',body:fd});const d=await r.json();wsSend({type:'message',to:currentChat,fileUrl:d.url,fileName:d.name,fileType:mime,isVideo:true,time:localTime()});}
      catch{alert('Ошибка загрузки видео');}
      mediaRecorder=null;recChunks=[];
    };
    mediaRecorder.start();
    document.getElementById('recIndicator').style.display='flex';
    document.getElementById('msgInput').style.display='none';
    recTimer=setInterval(()=>{recSecs++;const m=Math.floor(recSecs/60),s=recSecs%60;document.getElementById('recTime').textContent=m+':'+(s<10?'0':'')+s;},1000);
  }catch(e){alert('Нет доступа к камере: '+e.message);}
}

function stopVideoRec(){
  if(!mediaRecorder)return;
  const mr=mediaRecorder;
  mr.stop();
  clearInterval(recTimer);
  document.getElementById('recIndicator').style.display='none';
  document.getElementById('msgInput').style.display='';
}

function cancelVideoRec(){
  if(mediaRecorder){try{mediaRecorder.stream?.getTracks().forEach(t=>t.stop());}catch{}mediaRecorder=null;}
  recChunks=[];clearInterval(recTimer);
  document.getElementById('recIndicator').style.display='none';
  document.getElementById('msgInput').style.display='';
  const p=document.getElementById('videoPreview');if(p){p.style.display='none';p.srcObject=null;}
}

async function flipCamera(){
  recFacing=recFacing==='user'?'environment':'user';
  if(!mediaRecorder||mediaRecorder.state==='inactive')return;
  // Stop old stream without triggering upload
  clearInterval(recTimer);
  const oldStream=mediaRecorder.stream;
  mediaRecorder.onstop=null;
  try{mediaRecorder.stop();}catch{}
  oldStream?.getTracks().forEach(t=>t.stop());
  mediaRecorder=null;
  recChunks=[];  // сбрасываем чанки — начинаем запись с новой камеры с нуля
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:recFacing},audio:true});
    const preview=document.getElementById('videoPreview');
    if(preview){preview.srcObject=stream;preview.style.transform=recFacing==='user'?'scaleX(-1)':'none';}
    const mime=MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':'video/webm';
    mediaRecorder=new MediaRecorder(stream,{mimeType:mime});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const preview2=document.getElementById('videoPreview');
      if(preview2){preview2.style.display='none';preview2.srcObject=null;}
      const m2=mediaRecorder.mimeType||'video/webm';
      const ext2=m2.includes('mp4')?'mp4':'webm';
      const blob=new Blob(recChunks,{type:m2});
      const fd=new FormData();fd.append('file',new File([blob],`video.${ext2}`,{type:m2}));
      try{const r=await fetch('/upload',{method:'POST',body:fd});const d=await r.json();wsSend({type:'message',to:currentChat,fileUrl:d.url,fileName:d.name,fileType:m2,isVideo:true,time:localTime()});}
      catch{alert('Ошибка загрузки видео');}
      mediaRecorder=null;recChunks=[];
    };
    mediaRecorder.start();
    recTimer=setInterval(()=>{recSecs++;const m=Math.floor(recSecs/60),s=recSecs%60;document.getElementById('recTime').textContent=m+':'+(s<10?'0':'')+s;},1000);
  }catch(e){alert('Ошибка камеры: '+e.message);}
}

async function loadVapidKey(){
  try{const r=await fetch('/vapid-public-key');const d=await r.json();vapidKey=d.key;}catch{}
  checkNotif();
}
function checkNotif(){
  const btn=document.getElementById('notifBtn');
  if(!('Notification'in window)||!('serviceWorker'in navigator)){btn.style.display='none';return;}
  if(Notification.permission==='granted'){btn.textContent='🔔';btn.onclick=()=>new Notification('Егерь',{body:'Уведомления работают! 🎉'});}
  else if(Notification.permission==='denied'){btn.style.display='none';}
}
async function requestNotif(){
  const p=await Notification.requestPermission();
  if(p!=='granted'){checkNotif();return;}
  try{
    const reg=await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:u8(vapidKey)});
    wsSend({type:'subscribe',subscription:sub});checkNotif();
  }catch(e){alert('Ошибка: '+e.message);}
}
function u8(b){const s=b.replace(/-/g,'+').replace(/_/g,'/'),pad='='.repeat((4-s.length%4)%4),raw=atob(s+pad);return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}

// Patch wsSend for favorites - store locally
const _wsSend=wsSend;
window.wsSend=function(obj){
  if(obj.type==='message'&&obj.to===FAV_ID){
    // Store in localStorage
    const key='efav_msgs_'+currentUser;
    const msgs=JSON.parse(ss(key)||'[]');
    const entry={id:Date.now(),from:currentUser,to:FAV_ID,text:obj.text||'',fileUrl:obj.fileUrl||null,fileName:obj.fileName||null,fileType:obj.fileType||null,isVideo:obj.isVideo||false,time:obj.time||localTime(),status:'read'};
    msgs.push(entry);
    sw(key,JSON.stringify(msgs));
    // Show immediately
    addBubble(entry);
    // Update chat preview
    if(!chats[FAV_ID])chats[FAV_ID]={unread:0,pinned:true};
    chats[FAV_ID].lastMsg=entry.text||(entry.isVideo?'🎥':'📎 '+entry.fileName);
    chats[FAV_ID].lastTime=entry.time;
    saveChats();renderLists();
    return true;
  }
  if(obj.type==='get_history'&&obj.with===FAV_ID){
    const key='efav_msgs_'+currentUser;
    const msgs=JSON.parse(ss(key)||'[]');
    renderHistory(FAV_ID,msgs);
    return true;
  }
  if(obj.type==='read'&&obj.with===FAV_ID)return true;
  return _wsSend(obj);
};
